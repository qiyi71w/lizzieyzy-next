name: Feature Request
description: Suggest a practical improvement for users of this maintained fork.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请尽量从真实使用场景出发描述需求，而不是只写一个抽象想法。
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: 现在的流程在哪一步不方便？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      placeholder: 你希望软件怎么改？
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Who would benefit from this?
      placeholder: 哪一类用户最需要这个改动？
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      placeholder: 相关截图、参考项目、草图、流程说明都可以放这里。
